name: ci-and-release

on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      mc_target:
        description: Minecraft target version
        required: false
        type: choice
        options:
          - "all"
          - "26.1"
          - "1.21.1"
          - "1.20.6"
        default: "all"

jobs:
  resolve-target:
    runs-on: ubuntu-24.04
    outputs:
      build_matrix: ${{ steps.target.outputs.build_matrix }}
      release_target: ${{ steps.target.outputs.release_target }}
    steps:
      - name: checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - name: resolve build target
        id: target
        shell: bash
        run: |
          set -euo pipefail

          default_target="$(awk -F= '$1=="minecraft_version" { print $2 }' gradle.properties | tr -d '[:space:]')"
          if [[ -z "$default_target" ]]; then
            echo "Cannot resolve minecraft_version from gradle.properties"
            exit 1
          fi

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]] && [[ -n "${{ github.event.inputs.mc_target }}" ]]; then
            selected_target="${{ github.event.inputs.mc_target }}"
          else
            selected_target="all"
          fi

          case "$selected_target" in
            all)
              build_matrix='["26.1","1.21.1","1.20.6"]'
              ;;
            26.1|1.21.1|1.20.6)
              build_matrix="[\"${selected_target}\"]"
              ;;
            *)
              echo "Unsupported mc_target: $selected_target"
              exit 1
              ;;
          esac

          echo "build_matrix=${build_matrix}" >> "$GITHUB_OUTPUT"
          echo "release_target=${default_target}" >> "$GITHUB_OUTPUT"

  precheck:
    runs-on: ubuntu-24.04
    outputs:
      is_release_commit: ${{ steps.commit_check.outputs.is_release_commit }}
    steps:
      - name: checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - name: check latest commit subject
        id: commit_check
        shell: bash
        run: |
          set -euo pipefail
          subject="$(git log -1 --pretty=%s "${GITHUB_SHA}")"
          if printf '%s\n' "$subject" | grep -Eq '^release(\([^)]+\))?: v[^[:space:]]+$'; then
            echo "is_release_commit=true" >> "$GITHUB_OUTPUT"
          else
            echo "Latest commit subject does not match release format, release job will be skipped."
            echo "is_release_commit=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: resolve-target
    strategy:
      fail-fast: false
      matrix:
        mc_target: ${{ fromJson(needs.resolve-target.outputs.build_matrix) }}
    runs-on: ubuntu-24.04
    steps:
      - name: checkout repository
        uses: actions/checkout@v6
      - name: validate gradle wrapper
        uses: gradle/actions/wrapper-validation@v6
      - name: setup jdk
        uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: "microsoft"
      - name: make gradle wrapper executable
        run: chmod +x ./gradlew
      - name: build
        run: ./gradlew build -PmcTarget=${{ matrix.mc_target }}
      - name: capture build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: Artifacts-mc${{ matrix.mc_target }}
          path: build/libs/

  release:
    needs: [resolve-target, precheck, build]
    if: startsWith(github.ref, 'refs/tags/') && needs.precheck.outputs.is_release_commit == 'true'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: setup jdk
        uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: "microsoft"

      - name: make gradle wrapper executable
        run: chmod +x ./gradlew

      - name: build release artifacts
        run: ./gradlew build -PmcTarget=${{ needs.resolve-target.outputs.release_target }}

      - name: validate release metadata
        id: release_meta
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if [[ -z "$tag" ]]; then
            echo "Invalid tag format: empty tag name"
            exit 1
          fi

          version="${tag}"
          escaped_tag="$(printf '%s\n' "$tag" | sed -e 's/[][(){}.^$*+?|\\/]/\\\\&/g')"
          actual_commit_subject="$(git log -1 --pretty=%s "${GITHUB_SHA}")"
          if ! printf '%s\n' "$actual_commit_subject" | grep -Eq "^release(\([^)]+\))?: v${escaped_tag}$"; then
            echo "Invalid release commit subject: ${actual_commit_subject}"
            echo "Expected: release: v${tag} or release(<scope>): v${tag}"
            exit 1
          fi

          short_sha="$(git rev-parse --short=7 "${GITHUB_SHA}")"
          expected_tag_message="commit ${short_sha}"
          actual_tag_message="$(git for-each-ref "refs/tags/${tag}" --format='%(contents)' | head -n1)"
          if [[ "$actual_tag_message" != "$expected_tag_message" ]]; then
            echo "Invalid tag annotation message: ${actual_tag_message}"
            echo "Expected: ${expected_tag_message}"
            exit 1
          fi

          git fetch origin --prune
          if ! git branch -r --contains "${GITHUB_SHA}" | sed 's/^[*[:space:]]*//' | grep -qx "origin/main"; then
            echo "Tagged commit is not contained in expected branch: origin/main"
            exit 1
          fi

          : > release-notes.txt
          if grep -qE "^## ${version}$" CHANGELOG.md; then
            awk -v ver="$version" '
              BEGIN { in_section=0 }
              $0 == "## " ver { in_section=1; next }
              /^## / && in_section { exit }
              in_section { print }
            ' CHANGELOG.md > release-notes.txt
          else
            echo "No changelog section for ${version}, release body will be empty."
          fi

          {
            echo "title=v${tag}"
            echo "version=${version}"
            echo "notes<<EOF"
            cat release-notes.txt
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: create github release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ steps.release_meta.outputs.title }}
          body: ${{ steps.release_meta.outputs.notes }}
          files: build/libs/*.jar
